# macOS 便携版：zip 内含 .app，解压后可直接运行（未签名需在系统设置中允许或右键打开）
name: 构建便携版 ZIP

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  portable-zip:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      # CI 无 Apple 开发者证书时不自动查找签名身份，生成未签名的 .app
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建前端并打包 macOS zip
        run: npm run electron:build:portable-zip

      - name: 上传便携版 zip
        uses: actions/upload-artifact@v4
        with:
          name: 色彩工坊-便携版-macos-zip
          path: dist_portable/*.zip
          if-no-files-found: error
