# macOS 便携版：两个独立 Job，分别产出 Apple Silicon (arm64) 与 Intel (x64) zip
name: 构建便携版 ZIP

on:
  workflow_dispatch:
  push:
    branches: [main]

# 矩阵在部分界面会合成一个「portable-zip」；拆成两个 job 侧栏与图里都会各显示一条
jobs:
  macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac zip --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-colortools-macos-Apple-Silicon-ARM64
          path: dist_portable/*.zip
          if-no-files-found: error

  macos-intel:
    name: macOS Intel (x64)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac zip --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-colortools-macos-Intel-x64
          path: dist_portable/*.zip
          if-no-files-found: error
