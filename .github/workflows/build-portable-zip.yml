# macOS 便携版：分别产出 Apple Silicon (arm64) 与 Intel (x64) 两个 zip
name: 构建便携版 ZIP

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  portable-zip:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: Apple-Silicon-ARM64
          - arch: x64
            label: Intel-x64
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 打包 macOS zip（${{ matrix.label }}）
        run: npx electron-builder --mac zip --${{ matrix.arch }} --publish never

      - name: 上传便携版 zip
        uses: actions/upload-artifact@v4
        with:
          # 产物名仅 ASCII，符合 GitHub Artifacts 命名规则；zip 内 .app 仍为「色彩工坊」
          name: mac-colortools-macos-${{ matrix.label }}
          path: dist_portable/*.zip
          if-no-files-found: error
